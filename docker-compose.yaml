services:
  postgres:
    image: postgres:17
    container_name: linktracker-db
    environment:
      POSTGRES_DB: linktracker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d linktracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - linktracker-net

  migrator:
    container_name: migrations
    image: liquibase/liquibase:4.29
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --searchPath=/changesets
      - --changelog-file=master.xml
      - --driver=org.postgresql.Driver
      - --url=jdbc:postgresql://postgres:5432/linktracker
      - --username=${POSTGRES_USER}
      - --password=${POSTGRES_PASSWORD}
      - update
    volumes:
      - ./migrations:/changesets
    networks:
      - linktracker-net

  kafka1:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka1
    container_name: linktracker-kafka1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9093,3@kafka3:9093"

      KAFKA_LISTENERS: "INTERNAL://kafka1:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka1:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka1:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      CLUSTER_ID: "EmptNWtoR4GGWx-BH6nGLQ"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka1_data:/var/lib/kafka/data
    networks:
      - linktracker-net

  kafka2:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka2
    container_name: linktracker-kafka2
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9093,3@kafka3:9093"

      KAFKA_LISTENERS: "INTERNAL://kafka2:29092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka2:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka2:29092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      CLUSTER_ID: "EmptNWtoR4GGWx-BH6nGLQ"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka2_data:/var/lib/kafka/data
    networks:
      - linktracker-net

  kafka3:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka3
    container_name: linktracker-kafka3
    ports:
      - "9096:9096"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9093,3@kafka3:9093"

      KAFKA_LISTENERS: "INTERNAL://kafka3:29092,EXTERNAL://0.0.0.0:9096,CONTROLLER://kafka3:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka3:29092,EXTERNAL://localhost:9096"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      CLUSTER_ID: "EmptNWtoR4GGWx-BH6nGLQ"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka3_data:/var/lib/kafka/data
    networks:
      - linktracker-net

  kafka-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: linktracker-kafka-init
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    command: >
      bash -c "
      echo 'Waiting for Kafka cluster...';
      sleep 25;
      echo 'Creating topic link-updates...';
      kafka-topics --bootstrap-server kafka1:29092,kafka2:29092,kafka3:29092 --create --if-not-exists --topic link-updates --partitions 4 --replication-factor 3 --config min.insync.replicas=2;
      echo 'Creating topic link-updates-dlt...';
      kafka-topics --bootstrap-server kafka1:29092,kafka2:29092,kafka3:29092 --create --if-not-exists --topic link-updates-dlt --partitions 4 --replication-factor 3 --config min.insync.replicas=2;
      echo 'Creating topic link.raw-updates...';
      kafka-topics --bootstrap-server kafka1:29092,kafka2:29092,kafka3:29092 --create --if-not-exists --topic link.raw-updates --partitions 4 --replication-factor 3 --config min.insync.replicas=2;
      echo 'Creating topic link.processed-updates...';
      kafka-topics --bootstrap-server kafka1:29092,kafka2:29092,kafka3:29092 --create --if-not-exists --topic link.processed-updates --partitions 4 --replication-factor 3 --config min.insync.replicas=2;
      echo 'Kafka topics:';
      kafka-topics --bootstrap-server kafka1:29092,kafka2:29092,kafka3:29092 --list;
      "
    networks:
      - linktracker-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: linktracker-kafka-ui
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: linktracker
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:29092,kafka2:29092,kafka3:29092
    networks:
      - linktracker-net
  valkey-cluster:
    image: valkey/valkey:8.1
    container_name: linktracker-valkey-cluster
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    command:
      - sh
      - -c
      - |
        mkdir -p /data/node-1 /data/node-2 /data/node-3;

        valkey-server \
          --port 6379 \
          --cluster-enabled yes \
          --cluster-config-file nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --dir /data/node-1 \
          --requirepass "$$VALKEY_PASSWORD" \
          --masterauth "$$VALKEY_PASSWORD" \
          --protected-mode no \
          --cluster-announce-ip 127.0.0.1 \
          --cluster-announce-port 6379 \
          --cluster-announce-bus-port 16379 &

        valkey-server \
          --port 6380 \
          --cluster-enabled yes \
          --cluster-config-file nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --dir /data/node-2 \
          --requirepass "$$VALKEY_PASSWORD" \
          --masterauth "$$VALKEY_PASSWORD" \
          --protected-mode no \
          --cluster-announce-ip 127.0.0.1 \
          --cluster-announce-port 6380 \
          --cluster-announce-bus-port 16380 &

        valkey-server \
          --port 6381 \
          --cluster-enabled yes \
          --cluster-config-file nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --dir /data/node-3 \
          --requirepass "$$VALKEY_PASSWORD" \
          --masterauth "$$VALKEY_PASSWORD" \
          --protected-mode no \
          --cluster-announce-ip 127.0.0.1 \
          --cluster-announce-port 6381 \
          --cluster-announce-bus-port 16381 &

        echo "Waiting for Valkey nodes...";

        until valkey-cli -a "$$VALKEY_PASSWORD" -p 6379 ping | grep -q PONG; do sleep 1; done;
        until valkey-cli -a "$$VALKEY_PASSWORD" -p 6380 ping | grep -q PONG; do sleep 1; done;
        until valkey-cli -a "$$VALKEY_PASSWORD" -p 6381 ping | grep -q PONG; do sleep 1; done;

        echo "All Valkey nodes are available.";

        if valkey-cli -a "$$VALKEY_PASSWORD" -p 6379 cluster info | grep -q "cluster_state:ok"; then
          echo "Valkey cluster already exists.";
        else
          echo "Creating Valkey cluster...";
          valkey-cli -a "$$VALKEY_PASSWORD" --cluster create 127.0.0.1:6379 127.0.0.1:6380 127.0.0.1:6381 --cluster-replicas 0 --cluster-yes;
        fi;

        echo "Valkey cluster info:";
        valkey-cli -a "$$VALKEY_PASSWORD" -p 6379 cluster info;

        wait
    ports:
      - "6379:6379"
      - "6380:6380"
      - "6381:6381"
      - "16379:16379"
      - "16380:16380"
      - "16381:16381"
    volumes:
      - valkey_cluster_data:/data
    networks:
      - linktracker-net

  valkey-standalone:
    image: valkey/valkey:8.1
    container_name: linktracker-valkey-standalone
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    command:
      - sh
      - -c
      - |
        valkey-server \
          --port 6379 \
          --requirepass "$$VALKEY_PASSWORD" \
          --protected-mode no \
          --save "" \
          --appendonly no
    ports:
      - "6385:6379"
    networks:
      - linktracker-net

  scrapper:
    build:
      context: .
      dockerfile: scrapper/Dockerfile
    container_name: linktracker-scrapper
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      GITHUB_TOKEN: ${GITHUB_TOKEN}
      STACKOVERFLOW_KEY: ${STACKOVERFLOW_KEY}
      STACKOVERFLOW_ACCESS_KEY: ${STACKOVERFLOW_ACCESS_KEY}
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      valkey-standalone:
        condition: service_started
      pushgateway:
        condition: service_started
    networks:
      - linktracker-net

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: linktracker-bot
    ports:
      - "8080:8080"
      - "8011:8011"
    environment:
      SPRING_PROFILES_ACTIVE: docker

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}

      PUSHGATEWAY_URL: http://pushgateway:9091
    depends_on:
      postgres:
        condition: service_healthy
      scrapper:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      pushgateway:
        condition: service_started
    networks:
      - linktracker-net

  ai-agent:
    build:
      context: .
      dockerfile: ai-agent/Dockerfile
    container_name: linktracker-ai-agent
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka1:29092,kafka2:29092,kafka3:29092

      AI_AGENT_KAFKA_RAW_UPDATES_TOPIC: link.raw-updates
      AI_AGENT_KAFKA_PROCESSED_UPDATES_TOPIC: link.processed-updates

      GPT_KEY: ${GPT_KEY}
      GPT_FOLDER_ID: ${GPT_FOLDER_ID}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - linktracker-net

  pushgateway:
    image: prom/pushgateway:v1.10.0
    container_name: linktracker-pushgateway
    ports:
      - "9091:9091"
    command:
      - "--web.enable-admin-api"
    networks:
      - linktracker-net

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: linktracker-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      scrapper:
        condition: service_started
      bot:
        condition: service_started
      pushgateway:
        condition: service_started
    networks:
      - linktracker-net

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: linktracker-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - linktracker-net

networks:
  linktracker-net:
    driver: bridge

volumes:
  postgres_data:
  kafka1_data:
  kafka2_data:
  kafka3_data:
  valkey_cluster_data:
  grafana_data:
