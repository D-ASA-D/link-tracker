server:
  port: 8081

spring:
  application:
    name: scrapper
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        linger.ms: 20
        batch.size: 32768
        spring.json.add.type.headers: false
  datasource:
    url: jdbc:postgresql://localhost:5432/linktracker
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  liquibase:
    enabled: true
    change-log: file:./migrations/master.xml
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /
      path-mapping:
        prometheus: metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: scrapper
      service_type: scrapper
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
      slo:
        http.server.requests: 10ms,25ms,50ms,100ms,250ms,500ms,1000ms,2500ms,5000ms,10000ms

app:
  notification:
    transport: OUTBOX

  kafka:
    topic: link.raw-updates

  outbox:
    interval-ms: 5000
    batch-size: 100
    max-attempts: 5
    send-timeout-ms: 10000

  stackoverflow:
    key: ${STACKOVERFLOW_KEY}
    access-token: ${STACKOVERFLOW_ACCESS_KEY}
    base-url: https://api.stackexchange.com/2.3

  github:
    token: ${GITHUB_TOKEN}
    base-url: https://api.github.com

  bot:
    base-url: http://localhost:8080

  scheduler:
    interval: 60000
    batch-size: 100
    threads: 4
    recheck-age: PT30S

  access-type: ORM

  valkey:
    cache-type: CLIENT_SIDE
    standalone-node: localhost:6385
    password: ${VALKEY_PASSWORD:}
    cache-ttl: 10m

  resilience:
    timeout:
      connect-timeout: 1s
      read-timeout: 2s

    retry:
      max-attempts: 3
      wait-duration: 500ms
      backoff-strategy: EXPONENTIAL
      retryable-statuses:
        - 500
        - 502
        - 503
        - 504
        - 408
        - 429

    circuit-breaker:
      sliding-window-size: 10
      minimum-number-of-calls: 5
      failure-rate-threshold: 50
      permitted-calls-in-half-open-state: 3
      wait-duration-in-open-state: 5s

    rate-limit:
      limit-for-period: 60
      refresh-period: 1m
      timeout-duration: 0ms
