spring:
  liquibase:
    enabled: true
    change-log: file:../migrations/master.xml

app:
  valkey:
    cache-type: NONE
  github:
    base-url: ${wiremock.server.baseUrl}
  stackoverflow:
    base-url: ${wiremock.server.baseUrl}
  scheduler:
    batch-size: 100
    threads: 4
    recheck-age: PT30S
  resilience:
    timeout:
      connect-timeout: 200ms
      read-timeout: 500ms

    retry:
      max-attempts: 3
      wait-duration: 50ms
      backoff-strategy: CONSTANT
      exponential-multiplier: 2.0
      retryable-statuses:
        - 500
        - 502
        - 503
        - 504
        - 408
        - 429

    circuit-breaker:
      sliding-window-size: 10
      minimum-number-of-calls: 5
      failure-rate-threshold: 50
      permitted-calls-in-half-open-state: 3
      wait-duration-in-open-state: 500ms

    rate-limit:
      limit-for-period: 2
      refresh-period: 1m
      timeout-duration: 0ms
