apiVersion: 1

groups:
  - orgId: 1
    name: link-tracker-memory-alerts
    folder: Link Tracker Alerts
    interval: 1m
    rules:
      - uid: high-jvm-heap-memory-usage
        title: High JVM heap memory usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                sum by (application) (
                  jvm_memory_used_bytes{
                    job=~"bot|scrapper",
                    instance=~"bot:8011|scrapper:8081",
                    area="heap",
                    application=~"bot|scrapper"
                  }
                )
                /
                sum by (application) (
                  jvm_memory_max_bytes{
                    job=~"bot|scrapper",
                    instance=~"bot:8011|scrapper:8081",
                    area="heap",
                    application=~"bot|scrapper"
                  }
                )
                * 100
              range: true
              instant: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 80
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: JVM heap memory usage is above 80%
          description: Application {{ $labels.application }} uses more than 80% of available JVM heap memory.
        labels:
          severity: warning
          service: link-tracker
        isPaused: false
