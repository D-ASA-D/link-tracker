global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "scrapper"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "scrapper:8081"

  - job_name: "bot"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "bot:8011"

  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets:
          - "pushgateway:9091"
